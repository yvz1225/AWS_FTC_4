service: team-up-sentinel
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-northeast-2
  environment:
    GEMINI_API_KEY: ${env:GEMINI_API_KEY}
    NOTION_API_KEY: ${env:NOTION_API_KEY}
    NOTION_PARENT_DB_ID: ${env:NOTION_PARENT_DB_ID}
    GITHUB_TOKEN: ${env:GITHUB_TOKEN}

functions:
  managerAgent:
    handler: src/managerAgent.handler
    events:
      - httpApi:
          path: /agent/manager
          method: post

  builderAgent:
    handler: src/builderAgent.handler
    events:
      - httpApi:
          path: /agent/builder
          method: post

  trackerAgent:
    handler: src/trackerAgent.handler
    events:
      - schedule: rate(1 hour)

  reportJudgeAgent:
    handler: src/reportJudgeAgent.handler
    events:
      - httpApi:
          path: /agent/judge
          method: post

  kiroHooks:
    handler: src/kiroHooks.handler
    events:
      - httpApi:
          path: /hooks/deploy
          method: post

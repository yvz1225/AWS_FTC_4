service: team-up-sentinel

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  environment:
    GEMINI_API_KEY: ${env:GEMINI_API_KEY}
    NOTION_API_KEY: ${env:NOTION_API_KEY}
    NOTION_PARENT_PAGE_ID: ${env:NOTION_PARENT_PAGE_ID}
    GITHUB_TOKEN: ${env:GITHUB_TOKEN}
    SES_SENDER_EMAIL: ${env:SES_SENDER_EMAIL}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - ses:SendEmail
          Resource: "*"

functions:
  # 메인 API (Lambda 함수 URL로 모든 HTTP 요청 처리)
  api:
    handler: app.handlers.handler
    timeout: 60
    url: true  # Lambda 함수 URL 활성화

  # Tracker (수동 실행 / 테스트용)
  trackerAgent:
    handler: app.handlers.tracker_handler
    timeout: 120

  # Reminder (수동 실행 / 테스트용)
  reminderService:
    handler: app.handlers.reminder_handler
    timeout: 60
